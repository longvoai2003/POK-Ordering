name: CI 

on: 
  push: 
    branches:
      - 'feat/**' 
      - 'feature/**' 

  pull_request: 
    branches:
      - dev
      - main

jobs:
  unit:
    # Explicit name that will show up exactly as "Unit and Lint" on pushes
    # and "Unit and Lint (pull_request)" on PRs
    name: Unit and Lint
    runs-on: ubuntu-latest 

    env:
      BANK_NAME: ${{ secrets.BANK_NAME }}
      BANK_BIN: ${{ secrets.BANK_BIN }}
      BANK_ACCOUNT: ${{ secrets.BANK_ACCOUNT }}
      BANK_ACCOUNT_NAME: ${{ secrets.BANK_ACCOUNT_NAME }}

    steps: 
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Setup Python 
        uses: actions/setup-python@v5
        with: 
          python-version: "3.13"

      - name: Setup uv 
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync

      - name: Run lint and unit tests
        run: make ci

  integration-postgres:
    # Capitalized to keep naming conventions consistent across your dashboard
    name: Integration - Postgres
    runs-on: ubuntu-latest
    needs: unit 
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: pureorganic
          POSTGRES_USER: pureorganic
          POSTGRES_PASSWORD: pureorganic
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pureorganic -d pureorganic"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://pureorganic:pureorganic@localhost:5432/pureorganic

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Sync dependencies
        run: uv sync

      - name: Run webhook integration tests
        run: make test-integration-webhooks

      - name: Run Postgres integration tests
        run: make ci-integration-postgres

  integration-google-sheets:
    name: Integration - Google Sheets
    runs-on: ubuntu-latest
    needs: unit
    if: github.event_name == 'pull_request'
    env:
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp/credentials.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies
        run: uv sync

      - name: Write Google credentials
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          mkdir -p /tmp/gcp
          printf '%s' "$GOOGLE_SERVICE_ACCOUNT_JSON" > /tmp/gcp/credentials.json

      - name: Run Google Sheets integration tests
        run: make ci-integration-google-sheets
